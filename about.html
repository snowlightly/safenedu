<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>세이프N교육센터 - 센터소개</title>
    <style>
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; min-height: 100vh; font-family: "Malgun Gothic", "맑은 고딕", sans-serif; line-height: 1.6; color: #333; display: flex; flex-direction: column; background-color: #fff; }
        
        /* 헤더 */
        header { height: 80px; display: flex; justify-content: space-between; align-items: center; padding: 0 40px; border-bottom: 1px solid #eee; background: white; flex-shrink: 0; }
        .logo-area img { height: 60px; display: block; }
        nav { display: flex; gap: 25px; }
        nav a { text-decoration: none; color: black; font-weight: bold; font-size: 18px; position: relative; }
        nav a.active::after { content: ''; position: absolute; left: 0; bottom: -5px; width: 100%; height: 3px; background-color: black; }

        /* 상단 배너: About_Background.jpg 이미지 적용 */
        .page-banner {
            height: 300px;
            background-image: url('About_Background.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex; justify-content: center; align-items: center; flex-shrink: 0;
        }
        .banner-title-box {
            background-color: rgba(0, 0, 0, 0.8); color: #fff; padding: 15px 60px;
            font-size: 40px; font-weight: bold; letter-spacing: 3px; border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* 본문 섹션: 배경 제거 및 원본 텍스트 레이아웃 */
        .content-section { padding: 80px 20px; text-align: center; max-width: 900px; margin: 0 auto; flex: 1; }
        .intro-text { font-size: 19px; color: #444; letter-spacing: -0.5px; word-break: keep-all; line-height: 1.8; }
        .intro-text p { margin: 15px 0; }
        .bold-text { font-weight: bold; color: #000; }
        .margin-v { margin: 35px 0; width: 40px; border-top: 2px solid #ddd; display: inline-block; }

        @media (max-width: 768px) {
            .page-banner { height: 200px; }
            .banner-title-box { font-size: 28px; padding: 10px 40px; }
            .content-section { padding: 40px 20px; }
            .intro-text { font-size: 17px; }
            header { padding: 0 20px; }
            nav a { font-size: 14px; gap: 10px; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo-area"><img src="Logo.png" alt="로고
