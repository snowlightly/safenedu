<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>세이프N교육센터 - 문의하기</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; font-family: "Malgun Gothic", "맑은 고딕", sans-serif; line-height: 1.6; color: #333; background-color: #fff; overflow-x: hidden; min-height: 100vh; display: flex; flex-direction: column; }

        header { height: 80px; display: flex; justify-content: space-between; align-items: center; padding: 0 40px; border-bottom: 1px solid #eee; background: white; flex-shrink: 0; }
        .logo-area { display: flex; align-items: center; text-decoration: none; }
        .logo-area img { height: 60px; display: block; border: 0; }

        nav { display: flex; align-items: center; gap: 25px; }
        nav a { text-decoration: none; color: black; font-weight: bold; font-size: 18px; position: relative; }
        nav a.active::after { content: ''; position: absolute; left: 0; bottom: -5px; width: 100%; height: 3px; background-color: black; }

        .page-banner { 
            height: 300px; 
            background-image: url('pen.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex; justify-content: center; align-items: center; flex-shrink: 0; 
            background-color: #333;
        }
        
        .banner-title-box { 
            background-color: rgba(0, 0, 0, 0.8); color: white; padding: 15px 60px; 
            font-size: 40px; font-weight: bold; letter-spacing: 3px; border: 1px solid rgba(255, 255, 255, 0.3); 
        }

        .content-section { max-width: 800px; margin: 60px auto; padding: 0 20px; flex: 1; text-align: center; width: 100%; }

        /* 교육신청 폼 디자인 */
        .form-container { 
            text-align: left; 
            border: 1px solid #eee; 
            border-radius: 10px; 
            padding: 40px; 
            box-shadow: 2px 2px 15px rgba(0,0,0,0.05); 
            background-color: #fafafa;
        }
        .form-title { font-size: 24px; font-weight: bold; margin-bottom: 30px; text-align: center; color: #111; border-bottom: 2px solid #ddd; padding-bottom: 15px; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 8px; color: #333; }
        .form-group input, .form-group textarea { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ccc; 
            border-radius: 5px; 
            font-family: inherit; 
            font-size: 16px;
        }
        .form-group textarea { resize: vertical; min-height: 150px; }
        
        .submit-btn { 
            display: block; 
            width: 100%; 
            padding: 15px; 
            background-color: #333; 
            color: #fff; 
            font-size: 18px; 
            font-weight: bold; 
            text-align: center; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
            transition: 0.2s; 
        }
        .submit-btn:hover { background-color: #000; }

        /* 모바일 최적화 (768px 이하 해상도) */
        @media (max-width: 768px) { 
            header { 
                height: auto; 
                flex-direction: column; 
                padding: 15px 10px; 
                gap: 15px; 
            }
            .logo-area img { height: 45px; }
            
            nav { 
                width: 100%;
                flex-wrap: wrap; 
                justify-content: center; 
                gap: 10px 15px; 
            }
            nav a { 
                font-size: 15px; 
                white-space: nowrap; 
            }

            .page-banner { height: 200px; } 
            .banner-title-box { font-size: 28px; padding: 10px 40px; } 
            
            .content-section { margin: 40px auto; }
            .form-container { padding: 20px; }
            .form-title { font-size: 20px; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo-area"><img src="Logo.png" alt="세이프N교육센터 로고"></a>
        <nav>
            <a href="index.html">홈</a>
            <a href="about.html">센터소개</a>
            <a href="teachers.html">강사소개</a>
            <a href="curriculum.html">교육과정</a>
            <a href="gallery.html">교육사진</a>
            <a href="contact.html" class="active">문의하기</a>
        </nav>
    </header>

    <div class="page-banner">
        <div class="banner-title-box">문의하기</div>
    </div>

    <section class="content-section">
        <div class="form-container">
            <div class="form-title">교육 문의 및 출강 신청</div>
            
            <form action="#" method="POST">
                <div class="form-group">
                    <label for="orgName">기관/기업명 (학교명)</label>
                    <input type="text" id="orgName" name="orgName" placeholder="기관명을 입력해주세요" required>
                </div>
                
                <div class="form-group">
                    <label for="contactName">담당자 성명</label>
                    <input type="text" id="contactName" name="contactName" placeholder="담당자 성명을 입력해주세요" required>
                </div>

                <div class="form-group">
                    <label for="phone">연락처</label>
                    <input type="tel" id="phone" name="phone" placeholder="010-0000-0000" required>
                </div>

                <div class="form-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" name="email" placeholder="example@email.com" required>
                </div>

                <div class="form-group">
                    <label for="details">문의 및 요청 내용</label>
                    <textarea id="details" name="details" placeholder="희망 교육 일자, 교육 인원, 기타 문의 사항을 적어주세요." required></textarea>
                </div>

                <button type="submit" class="submit-btn">신청하기</button>
            </form>
        </div>
    </section>

</body>
</html>
