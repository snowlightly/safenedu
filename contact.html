<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>세이프N교육센터 - 문의하기</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; font-family: "Malgun Gothic", "맑은 고딕", sans-serif; line-height: 1.6; color: #333; background-color: #fff; overflow-x: hidden; min-height: 100vh; display: flex; flex-direction: column; }

        header { height: 80px; display: flex; justify-content: space-between; align-items: center; padding: 0 40px; border-bottom: 1px solid #eee; background: white; flex-shrink: 0; }
        .logo-area { display: flex; align-items: center; text-decoration: none; }
        .logo-area img { height: 60px; display: block; border: 0; }

        nav { display: flex; align-items: center; gap: 25px; }
        nav a { text-decoration: none; color: black; font-weight: bold; font-size: 18px; position: relative; }
        nav a.active::after { content: ''; position: absolute; left: 0; bottom: -5px; width: 100%; height: 3px; background-color: black; }

        .page-banner { 
            height: 300px; 
            background-image: url('pen.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex; justify-content: center; align-items: center; flex-shrink: 0; 
            background-color: #333;
        }
        
        .banner-title-box { 
            background-color: rgba(0, 0, 0, 0.8); color: white; padding: 15px 60px; 
            font-size: 40px; font-weight: bold; letter-spacing: 3px; border: 1px solid rgba(255, 255, 255, 0.3); 
        }

        .content-section { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; text-align: center; }
        
        .form-link-area { max-width: 700px; width: 100%; margin-bottom: 30px; }
        .form-link-area img { width: 100%; height: auto; cursor: pointer; border-radius: 10px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); transition: transform 0.2s ease-in-out; }
        .form-link-area img:hover { transform: scale(1.02); }

        .contact-text { font-size: 20px; font-weight: bold; color: #444; margin-top: 20px; }

        /* 모바일 최적화 (768px 이하 해상도) */
        @media (max-width: 768px) { 
            header { height: auto; flex-direction: column; padding: 15px 10px; gap: 15px; }
            .logo-area img { height: 45px; }
            nav { width: 100%; flex-wrap: wrap; justify-content: center; gap: 10px 15px; }
            nav a { font-size: 15px; white-space: nowrap; }

            .page-banner { height: 200px; } 
            .banner-title-box { font-size: 28px; padding: 10px 40px; } 
            
            .content-section { padding: 40px 20px; }
            .contact-text { font-size: 16px; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo-area"><img src="Logo.png" alt="세이프N교육센터 로고"></a>
        <nav>
            <a href="index.html">홈</a>
            <a href="about.html">센터소개</a>
            <a href="teachers.html">강사소개</a>
            <a href="curriculum.html">교육과정</a>
            <a href="gallery.html">교육사진</a>
            <a href="contact.html" class="active">문의하기</a>
        </nav>
    </header>

    <div class="page-banner">
        <div class="banner-title-box">문의하기</div>
    </div>

    <section class="content-section">
        <a href="https://forms.gle/본인의구글폼주소" target="_blank" class="form-link-area">
            <img src="Form.png" alt="교육신청서 구글 폼 연동">
        </a>
        <p class="contact-text">이미지를 클릭하시면 교육신청서(구글 폼)로 연결됩니다.</p>
    </section>

</body>
</html>
