<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>세이프N교육센터 - 문의하기</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; font-family: "Malgun Gothic", "맑은 고딕", sans-serif; line-height: 1.6; color: #333; background-color: #fff; display: flex; flex-direction: column; min-height: 100vh; }

        header { height: 80px; display: flex; justify-content: space-between; align-items: center; padding: 0 40px; border-bottom: 1px solid #eee; background: white; flex-shrink: 0; }
        .logo-area { display: flex; align-items: center; text-decoration: none; }
        .logo-area img { height: 60px; display: block; border: 0; }

        nav { display: flex; align-items: center; gap: 25px; }
        nav a { text-decoration: none; color: black; font-weight: bold; font-size: 18px; position: relative; }
        nav a.active::after { content: ''; position: absolute; left: 0; bottom: -5px; width: 100%; height: 3px; background-color: black; }

        .content-section { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; text-align: center; }
        
        .form-image-link { max-width: 600px; width: 100%; text-decoration: none; display: block; margin-bottom: 20px; }
        .form-image-link img { width: 100%; height: auto; border-radius: 5px; transition: transform 0.2s; }
        .form-image-link img:hover { transform: scale(1.02); }

        .form-title { font-size: 28px; font-weight: bold; color: #000; margin-bottom: 20px; text-decoration: underline; text-underline-offset: 5px; cursor: pointer; }
        .form-title a { color: inherit; text-decoration: none; }
        .form-subtitle { font-size: 18px; color: #555; }

        @media (max-width: 768px) { 
            header { height: auto; flex-direction: column; padding: 15px 10px; gap: 15px; }
            .logo-area img { height: 45px; }
            nav { width: 100%; flex-wrap: wrap; justify-content: center; gap: 10px 15px; }
            nav a { font-size: 15px; white-space: nowrap; }
            .form-title { font-size: 22px; }
            .form-subtitle { font-size: 15px; word-break: keep-all; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo-area"><img src="Logo.png" alt="세이프N교육센터 로고"></a>
        <nav>
            <a href="index.html">홈</a>
            <a href="about.html">센터소개</a>
            <a href="teachers.html">강사소개</a>
            <a href="curriculum.html">교육과정</a>
            <a href="gallery.html">교육사진</a>
            <a href="contact.html" class="active">문의하기</a>
        </nav>
    </header>

    <main class="content-section">
        <a href="https://docs.google.com/forms/d/e/1FAIpQLSdaBrS-KZii8Ud6vrqba5IcEGe3HHlQkpRFbk9DHsALC_lNKg/viewform" target="_blank" class="form-image-link">
            <img src="Form.png" alt="교육신청서">
        </a>
        
        <h2 class="form-title">
            <a href="https://docs.google.com/forms/d/e/1FAIpQLSdaBrS-KZii8Ud6vrqba5IcEGe3HHlQkpRFbk9DHsALC_lNKg/viewform" target="_blank">교육신청서(폼)</a>
        </h2>
        <p class="form-subtitle">빠른 시일 내 확인 후 연락드리겠습니다</p>
    </main>

</body>
</html>
