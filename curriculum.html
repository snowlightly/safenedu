<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>세이프N교육센터 - 교육과정</title>
    <style>
        /* 기본 설정 */
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; font-family: "Malgun Gothic", "맑은 고딕", sans-serif; color: #333; line-height: 1.6; background-color: #fff; overflow-x: hidden; }
        
        /* 헤더 */
        header { height: 80px; display: flex; justify-content: space-between; align-items: center; padding: 0 40px; border-bottom: 1px solid #eee; background: white; flex-shrink: 0; }
        .logo-area { display: flex; align-items: center; text-decoration: none; }
        .logo-area img { height: 60px; display: block; }

        nav { display: flex; align-items: center; gap: 25px; }
        nav a { text-decoration: none; color: black; font-weight: bold; font-size: 18px; position: relative; }
        nav a.active::after { content: ''; position: absolute; left: 0; bottom: -5px; width: 100%; height: 3px; background-color: black; }

        /* 상단 배너: 배경색을 #333으로 통일 */
        .page-banner { 
            height: 300px; 
            background-color: #333; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            flex-shrink: 0; 
        }
        
        /* 제목 박스 스타일 통일 */
        .banner-title-box { 
            background-color: rgba(0, 0, 0, 0.8); 
            color: white; 
            padding: 15px 60px; 
            font-size: 40px; 
            font-weight: bold; 
            letter-spacing: 3px; 
            border: 1px solid rgba(255, 255, 255, 0.3); 
        }

        /* 컨텐츠 섹션 */
        .container { max-width: 1100px; margin: 50px auto; padding: 0 20px; }
        
        /* 교육 항목 레이아웃 */
        .edu-item { display: flex; align-items: center; padding: 50px 0; border-bottom: 1px solid #eee; gap: 60px; }
        .edu-item:last-child { border-bottom: none; }
        
        .edu-img { flex: 0 0 400px; text-align: center; }
        .edu-img img { width: 100%; height: auto; border-radius: 8px; border: 1px solid #f0f0f0; }
        
        .edu-info { flex: 1; }
        .edu-title { font-size: 26px; font-weight: bold; margin-bottom: 25px; border-bottom: 2px solid #333; display: inline-block; padding-bottom: 5px; }
        
        .edu-detail { list-style: none; padding: 0; margin: 0; font-size: 18px; }
        .edu-detail li { margin-bottom: 10px; display: flex; align-items: flex-start; }
        .edu-detail b { font-weight: bold; color: #000; width: 95px; flex-shrink: 0; }
        .detail-text { flex: 1; word-break: keep-all; }
