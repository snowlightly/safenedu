<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>세이프N교육센터 - 교육과정</title>
    <style>
        /* 기본 설정 */
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; font-family: "Malgun Gothic", "맑은 고딕", sans-serif; color: #333; line-height: 1.6; background-color: #fff; overflow-x: hidden; }
        
        /* 헤더: 로고만 배치 */
        header { height: 80px; display: flex; justify-content: space-between; align-items: center; padding: 0 40px; border-bottom: 1px solid #eee; background: white; flex-shrink: 0; }
        .logo-area { display: flex; align-items: center; text-decoration: none; }
        .logo-area img { height: 60px; display: block; }

        nav { display: flex; align-items: center; gap: 25px; }
        nav a { text-decoration: none; color: black; font-weight: bold; font-size: 18px; position: relative; }
        nav a.active::after { content: ''; position: absolute; left: 0; bottom: -5px; width: 100%; height: 3px; background-color: black; }

        /* 상단 배너: 배경색 #333으로 고정 (이미지 없이 구현) */
        .page-banner { 
            height: 300px; 
            background-color: #333; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            flex-shrink: 0; 
        }
        
        /* 제목 박스 스타일: 센터소개/강사소개와 통일 */
        .banner-title-box { 
            background-color: rgba(0, 0, 0, 0.8); 
            color: white; 
            padding: 15px 60px; 
            font-size: 40px; 
            font-weight: bold; 
            letter-spacing: 3px; 
            border: 1px solid rgba(255, 255, 255, 0.3); 
        }

        /* 컨텐츠 섹션 */
        .container { max-width: 1100px; margin: 50px auto; padding: 0 20px; }
        
        /* 교육 항목 레이아웃 */
