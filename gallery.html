<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>세이프N교육센터 - 교육사진</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; font-family: "Malgun Gothic", "맑은 고딕", sans-serif; line-height: 1.6; color: #333; background-color: #fff; display: flex; flex-direction: column; }

        header { height: 80px; display: flex; justify-content: space-between; align-items: center; padding: 0 40px; border-bottom: 1px solid #eee; background: white; flex-shrink: 0; }
        .logo-area { display: flex; align-items: center; text-decoration: none; }
        .logo-area img { height: 60px; display: block; border: 0; }

        nav { display: flex; align-items: center; gap: 25px; }
        nav a { text-decoration: none; color: black; font-weight: bold; font-size: 18px; position: relative; }
        nav a.active::after { content: ''; position: absolute; left: 0; bottom: -5px; width: 100%; height: 3px; background-color: black; }

        .content-section { flex: 1; padding: 60px 20px; text-align: center; max-width: 1200px; margin: 0 auto; width: 100%; }
        
        .gallery-title { font-size: 32px; font-weight: bold; margin-bottom: 20px; color: #111; }
        .gallery-subtitle { font-size: 18px; color: #666; margin-bottom: 50px; word-break: keep-all; }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 이미지처럼 2열 배치 */
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .gallery-box {
            aspect-ratio: 16 / 9;
            background-color: #f7f7f7;
            border: 2px dashed #ddd; /* 이미지의 점선 느낌 재현 */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border-radius: 4px;
        }

        .gallery-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 모바일 최적화 */
        @media (max-width: 768px) { 
            header { height: auto; flex-direction: column; padding: 15px 10px; gap: 15px; }
            .logo-area img { height: 45px; }
            nav { width: 100%; flex-wrap: wrap; justify-content: center; gap: 10px 15px; }
            nav a { font-size: 15px; white-space: nowrap; }

            .gallery-title { font-size: 24px; }
            .gallery-subtitle { font-size: 15px; margin-bottom: 30px; padding: 0 10px; }
            
            .gallery-grid { grid-template-columns: 1fr; gap: 15px; } /* 모바일은 1열 */
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo-area"><img src="Logo.png" alt="세이프N교육센터 로고"></a>
        <nav>
            <a href="index.html">홈</a>
            <a href="about.html">센터소개</a>
            <a href="teachers.html">강사소개</a>
            <a href="curriculum.html">교육과정</a>
            <a href="gallery.html" class="active">교육사진</a>
            <a href="contact.html">문의하기</a>
        </nav>
    </header>

    <main class="content-section">
        <h1 class="gallery-title">생명을 지키는 실전 교육 현장</h1>
        <p class="gallery-subtitle">예고 없는 위기의 순간, 또 다른 생명을 살려낼 준비를 위한 여러분의 노력을 응원합니다 !</p>

        <div class="gallery-grid">
            <div class="gallery-box"><img src="gallery1.jpg" alt="교육현장1" onerror="this.style.display='none';"></div>
            <div class="gallery-box"><img src="gallery2.jpg" alt="교육현장2" onerror="this.style.display='none';"></div>
            <div class="gallery-box"><img src="gallery3.jpg" alt="교육현장3" onerror="this.style.display='none';"></div>
            <div class="gallery-box"><img src="gallery4.jpg" alt="교육현장4" onerror="this.style.display='none';"></div>
        </div>
    </main>

</body>
</html>
