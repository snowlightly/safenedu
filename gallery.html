<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>세이프N교육센터 - 교육사진</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; font-family: "Malgun Gothic", "맑은 고딕", sans-serif; line-height: 1.6; color: #333; background-color: #fff; overflow-x: hidden; }

        header { height: 80px; display: flex; justify-content: space-between; align-items: center; padding: 0 40px; border-bottom: 1px solid #eee; background: white; flex-shrink: 0; }
        .logo-area { display: flex; align-items: center; text-decoration: none; }
        .logo-area img { height: 60px; display: block; border: 0; }

        nav { display: flex; align-items: center; gap: 25px; }
        nav a { text-decoration: none; color: black; font-weight: bold; font-size: 18px; position: relative; }
        nav a.active::after { content: ''; position: absolute; left: 0; bottom: -5px; width: 100%; height: 3px; background-color: black; }

        .page-banner { 
            height: 300px; 
            /* 배너 배경 이미지 이름은 실제 깃허브에 올린 파일명으로 변경해 */
            background-image: url('Gallery_Background.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex; justify-content: center; align-items: center; flex-shrink: 0; 
            background-color: #333;
        }
        
        .banner-title-box { 
            background-color: rgba(0, 0, 0, 0.8); color: white; padding: 15px 60px; 
            font-size: 40px; font-weight: bold; letter-spacing: 3px; border: 1px solid rgba(255, 255, 255, 0.3); 
        }

        .container { max-width: 1200px; margin: 60px auto; padding: 0 20px; }

        /* 사진 갤러리 바둑판 배열 (그리드) */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* PC에서는 3칸 */
            gap: 30px;
        }

        .gallery-item {
            border: 1px solid #eee;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.05);
            transition: transform 0.2s ease-in-out;
        }

        .gallery-item:hover {
            transform: translateY(-5px); /* 마우스 올리면 살짝 위로 뜸 */
        }

        .gallery-img {
            width: 100%;
            height: 250px;
            object-fit: cover; /* 사진 비율 깨짐 방지 */
            display: block;
        }

        .gallery-caption {
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 16px;
            background-color: #f9f9f9;
        }

        /* 모바일 최적화 (768px 이하 해상도) */
        @media (max-width: 768px) { 
            header { 
                height: auto; 
                flex-direction: column; 
                padding: 15px 10px; 
                gap: 15px; 
            }
            .logo-area img { height: 45px; }
            
            nav { 
                width: 100%;
                flex-wrap: wrap; 
                justify-content: center; 
                gap: 10px 15px; 
            }
            nav a { 
                font-size: 15px; 
                white-space: nowrap; /* 글씨 세로 쪼개짐 방지 */
            }

            .page-banner { height: 200px; } 
            .banner-title-box { font-size: 28px; padding: 10px 40px; } 

            /* 모바일에서는 사진을 1칸으로 변경 */
            .gallery-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            .gallery-img { height: 200px; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo-area"><img src="Logo.png" alt="세이프N교육센터 로고"></a>
        <nav>
            <a href="index.html">홈</a>
            <a href="about.html">센터소개</a>
            <a href="teachers.html">강사소개</a>
            <a href="curriculum.html">교육과정</a>
            <a href="gallery.html" class="active">교육사진</a>
            <a href="contact.html">문의하기</a>
        </nav>
    </header>

    <div class="page-banner">
        <div class="banner-title-box">교육사진</div>
    </div>

    <div class="container">
        <div class="gallery-grid">
            <div class="gallery-item">
                <img src="pic1.jpg" alt="심폐소생술 교육 사진" class="gallery-img" onerror="this.src='https://via.placeholder.com/400x300?text=Image+1';">
                <div class="gallery-caption">기관/기업 심폐소생술 교육</div>
            </div>

            <div class="gallery-item">
                <img src="pic2.jpg" alt="교직원 교육 사진" class="gallery-img" onerror="this.src='https://via.placeholder.com/400x300?text=Image+2';">
                <div class="gallery-caption">교직원 응급처치 교육</div>
            </div>

            <div class="gallery-item">
                <img src="pic3.jpg" alt="학생 교육 사진" class="gallery-img" onerror="this.src='https://via.placeholder.com/400x300?text=Image+3';">
                <div class="gallery-caption">학생 심폐소생술 교육</div>
            </div>

            <div class="gallery-item">
                <img src="pic4.jpg" alt="실습 사진" class="gallery-img" onerror="this.src='https://via.placeholder.com/400x300?text=Image+4';">
                <div class="gallery-caption">자동심장충격기 실습</div>
            </div>

            <div class="gallery-item">
                <img src="pic5.jpg" alt="일반인 교육 사진" class="gallery-img" onerror="this.src='https://via.placeholder.com/400x300?text=Image+5';">
                <div class="gallery-caption">일반인 안전 교육</div>
            </div>

            <div class="gallery-item">
                <img src="pic6.jpg" alt="예비교원 교육 사진" class="gallery-img" onerror="this.src='https://via.placeholder.com/400x300?text=Image+6';">
                <div class="gallery-caption">예비교원 실습 과정</div>
            </div>
        </div>
    </div>

</body>
</html>
