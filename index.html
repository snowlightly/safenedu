<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>안전교육센터 홈</title>
    <style>
        /* 기본 설정: 맑은 고딕, 여백 제거 */
        body {
            margin: 0;
            padding: 0;
            font-family: "Malgun Gothic", "맑은 고딕", sans-serif;
            text-align: center;
        }

        /* 네비게이션 바 */
        nav {
            padding: 20px 0;
            border-bottom: 1px solid #eee;
        }

        nav a {
            text-decoration: none;
            color: black;
            font-weight: bold;
            font-size: 22px; /* 요청사항: 22 */
            margin: 0 15px;
        }

        /* 배너 이미지 섹션 공통 스타일 */
        .main-banner {
            width: 100%;
            max-width: 1200px; /* 배너 최대 너비 조절 가능 */
            height: auto;
            display: block;
            margin: 0 auto;
        }
        
        /* 배너 사이 간격을 없애려면 아래 스타일 추가 (선택) */
        /*
        #banner1 {
            margin-bottom: 0;
        }
        #banner2 {
            margin-top: 0;
        }
        */

        /* 교육 문구 섹션 (한 줄 배치) */
        .education-section {
            padding: 60px 20px;
            display: flex;
            justify-content: center; /* 가로 중앙 정렬 */
            align-items: center;
            gap: 30px; /* 문구 사이 간격 */
            flex-wrap: wrap; /* 화면이 좁아지면 아래로 줄바꿈 */
        }

        .education-text {
            font-weight: bold;
            font-size: 36px; /* 요청사항: 36 */
            color: #333;
            margin: 0;
        }

        /* 문구 사이 구분선 (선택 사항) */
        .divider {
            font-size: 30px;
            color: #ccc;
        }
        
        /* 모바일 대응 (선택 사항): 화면이 좁을 때 글자 크기 조정 */
        @media (max-width: 768px) {
            .education-text {
                font-size: 24px;
            }
            .divider {
                display: none; /* 모바일에서는 구분선 숨김 */
            }
            .education-section {
                flex-direction: column; /* 모바일에서는 세로로 배치 */
                gap: 10px;
            }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">홈</a>
        <a href="intro.html">센터소개</a>
        <a href="teacher.html">강사소개</a>
        <a href="curriculum.html">교육과정</a>
        <a href="photo.html">교육사진</a>
        <a href="contact.html">문의하기</a>
    </nav>

    <img src="Banner_R1.png" alt="메인 배너 1" class="main-banner" id="banner1">
    
    <img src="Banner_R2.png" alt="메인 배너 2" class="main-banner" id="banner2">

    <div class="education-section">
        <p class="education-text">학교안전교육 7대 표준교육</p>
        <span class="divider">|</span>
        <p class="education-text">생애주기별 6대 안전교육</p>
        <span class="divider">|</span>
        <p class="education-text">산업체 안전교육</p>
    </div>

</body>
</html>
