<!DOCTYPE html>
<html lang="ko">
<head>
    <style>
        /* ... 기존 스타일들 ... */

        /* 1. 강사소개 배너 스타일 수정 */
        .page-banner.teacher-banner {
            height: 300px; /* 배너 높이 */
            /* 배경 이미지 설정 (가장 중요!) */
            background-image: url('Teacher about.png'); 
            background-size: cover;    /* 이미지가 배너를 꽉 채우도록 */
            background-position: center; /* 이미지 중앙 배치 */
            background-repeat: no-repeat; /* 반복 없음 */
            
            /* 글씨 얹기 위한 설정 */
            display: flex;
            justify-content: center; /* 가로 중앙 */
            align-items: center;     /* 세로 중앙 */
            
            /* 이미지 위에 어두운 오버레이 레이어 (글씨 잘 보이게) */
            position: relative;
        }

        /* 이미지 오버레이 (가독성 확보) */
        .page-banner.teacher-banner::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.4); /* 검은색 40% 불투명도 */
            z-index: 1;
        }

        /* 2. 배너 타이틀 박스 스타일 (기존 스타일 유지/보완) */
        .page-banner.teacher-banner .banner-title-box {
            background-color: rgba(0, 0, 0, 0.7); /* 기존 완전 검정에서 약간 투명하게 변경 */
            color: #fff;
            padding: 15px 60px;
            font-size: 40px;
            font-weight: bold;
            letter-spacing: 3px;
            
            /* 오버레이보다 위에 보이게 */
            position: relative;
            z-index: 2;
            
            /* 테두리 살짝 추가 (선택 사항) */
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* 반응형 설정 */
        @media (max-width: 768px) {
            .page-banner.teacher-banner { height: 200px; }
            .page-banner.teacher-banner .banner-title-box { font-size: 30px; padding: 10px 30px; }
        }
    </style>
</head>
<body>

    <div class="page-banner teacher-banner">
        <div class="banner-title-box">강사소개</div>
    </div>

    </body>
</html>
